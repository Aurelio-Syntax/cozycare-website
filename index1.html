<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Experience Aikawa-Style</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // 1. Instanziierte Geometrie (Die Scherben)
        const count = 2000;
        const geometry = new THREE.BoxGeometry(0.15, 0.15, 0.05); // Die "Dicke" des Glases
        const material = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.6, roughness: 0.1 });
        const mesh = new THREE.InstancedMesh(geometry, material, count);

        // 2. Initialisierung in Zylinder-Form
        const dummy = new THREE.Object3D();
        const positions = [];
        for(let i=0; i<count; i++) {
            const angle = (i / count) * Math.PI * 1.5;
            const x = Math.sin(angle) * 4;
            const z = Math.cos(angle) * 4 - 4;
            dummy.position.set(x, (Math.random()-0.5)*4, z);
            dummy.rotation.y = angle;
            dummy.updateMatrix();
            mesh.setMatrixAt(i, dummy.matrix);
            positions.push(new THREE.Vector3(x, 0, z)); // Save start pos
        }
        scene.add(mesh);

        // 3. Licht für den Aikawa-Glanz (Essential für Glas-Look)
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // 4. Interaktions-Logik (Klick auf Bild / Mesh)
        let shattered = false;
        window.addEventListener('click', () => {
            shattered = !shattered;
        });

        function animate() {
            requestAnimationFrame(animate);
            for(let i=0; i<count; i++) {
                mesh.getMatrixAt(i, dummy.matrix);
                dummy.matrix.decompose(dummy.position, dummy.rotation, dummy.scale);
                
                // Physik-Logik: Interpolation zum Scherben-Zustand
                if(shattered) {
                    dummy.position.x += (Math.random()-0.5) * 0.1;
                    dummy.position.z += (Math.random()-0.5) * 0.1;
                }
                
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
