<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>appscanfly</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#fff}
body{font-family:'Space Grotesk',sans-serif;color:#111}

nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 48px;pointer-events:none;
}
.nav-logo{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;color:#333;pointer-events:auto}
.nav-links{display:flex;gap:28px;pointer-events:auto}
.nav-links a{font-size:12px;color:#888;text-decoration:none;transition:color .2s}
.nav-links a:hover{color:#111}

#stage{position:fixed;inset:0;overflow:hidden;}

/* PORTFOLIO text — z:1, behind canvas */
#bg-text{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Playfair Display',serif;
  font-size:clamp(80px,13vw,190px);
  font-weight:900;letter-spacing:-.04em;
  color:#111;white-space:nowrap;
  pointer-events:none;z-index:1;
  transition:opacity .8s;user-select:none;
}
#bg-text.hide{opacity:0}

/* canvas — z:2, on top of text */
#c{
  position:absolute;inset:0;z-index:2;
  display:block;cursor:grab;
}
#c:active{cursor:grabbing}

#hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.14em;color:#999;text-transform:uppercase;
  z-index:10;pointer-events:none;transition:opacity .5s;
}

/* shards */
#sc{position:fixed;inset:0;pointer-events:none;z-index:90}

/* detail */
#detail{
  position:fixed;inset:0;z-index:100;background:#fff;
  overflow-y:auto;overflow-x:hidden;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
#detail.open{opacity:1;pointer-events:auto}
#dv-close{
  position:fixed;top:22px;right:36px;z-index:300;
  width:44px;height:44px;border:none;
  background:rgba(0,0,0,.07);backdrop-filter:blur(12px);
  border-radius:50%;cursor:pointer;font-size:17px;color:#333;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .4s .25s,background .2s;
}
#detail.open #dv-close{opacity:1}
#dv-close:hover{background:rgba(0,0,0,.13)}

.dv-sticky{
  position:sticky;top:0;height:58vh;min-height:300px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#fff;z-index:5;pointer-events:none;
}
#dv-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(52px,10vw,148px);
  font-weight:900;letter-spacing:-.04em;
  opacity:0;transform:scale(.25) translateY(24px);
  transition:opacity .65s cubic-bezier(.22,1,.36,1),transform .65s cubic-bezier(.22,1,.36,1);
}
#dv-title.show{opacity:1;transform:scale(1) translateY(0)}

.dv-body{position:relative;z-index:10;padding:0 0 160px;margin-top:-10px;}
.dv-intro{max-width:580px;margin:0 auto 48px;padding:0 24px;font-size:16px;color:#666;line-height:1.8;}
.dv-col{display:flex;flex-direction:column;align-items:center;gap:24px}
.dv-card{
  width:min(640px,90vw);border-radius:18px;overflow:hidden;
  box-shadow:0 18px 56px rgba(0,0,0,.09);
  opacity:0;transform:translateY(50px);
  transition:opacity .55s ease,transform .55s cubic-bezier(.22,1,.36,1);
}
.dv-card.in{opacity:1;transform:translateY(0)}
.dv-visual{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:72px;position:relative;overflow:hidden;
}
.dv-sc-label{
  position:absolute;bottom:12px;left:16px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;opacity:.55;
}
.dv-body2{padding:22px 26px;background:#fff}
.dv-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#bbb;margin-bottom:4px}
.dv-cname{font-size:19px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px}
.dv-cdesc{font-size:13px;color:#777;line-height:1.65}
.dv-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px}
.dv-tag{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid #e5e5e5;color:#aaa;font-family:'JetBrains Mono',monospace}
.dv-btn{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:14px;padding:11px 20px;border-radius:8px;
  font-weight:600;font-size:13px;text-decoration:none;
  transition:transform .2s,opacity .2s;
}
.dv-btn:hover{transform:translateY(-2px);opacity:.82}
</style>
</head>
<body>

<div id="stage">
  <div id="bg-text">PORTFOLIO</div>
  <canvas id="c"></canvas>
  <div id="hint">← ziehen · anklicken für details</div>
</div>

<canvas id="sc"></canvas>

<nav>
  <span class="nav-logo">appscanfly</span>
  <div class="nav-links">
    <a href="#">Apps</a><a href="#">Über</a>
    <a href="mailto:contact@appscanfly.de">Kontakt</a>
  </div>
</nav>

<div id="detail">
  <button id="dv-close">✕</button>
  <div class="dv-sticky"><div id="dv-title"></div></div>
  <div class="dv-body" id="dv-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════
const APPS = [
  {
    name:'SpecialMinds', emoji:'🧠', color:'#C97C5D',
    light:'#FDF0EB', mid:'#EDCAB5', sublabel:'Flutter · Firebase',
    desc:'Sichere Community für neurodivergente Menschen. Themenräume, Gedanken-Strom, Audio-Memos — zero Tracking, zero Ads.',
    tags:['Flutter','Firebase','AES-256','DSGVO'], playUrl:'#',
    screens:[
      {l:'Dashboard',d:'Mood-basiertes Dashboard mit 4 Themes — Sand & Terrakotta, Nebel & Salbei, Dämmerung, Nachtmodus Mint.'},
      {l:'Gedanken-Strom',d:'Forum-Feed mit Chat-Bubble-Cards, Herz-Reaktionen, Timeline-Connector.'},
      {l:'Brain Dump & Audio',d:'Schnelle Notizen + Audio-Memos (.m4a, lokal) — kein Cloud-Upload.'},
    ]
  },
  {
    name:'CozyCare', emoji:'💜', color:'#9B8EC4',
    light:'#F4F0FC', mid:'#C9C0E8', sublabel:'Jetpack Compose',
    desc:'Persönlicher Pflege- & Wellness-Planer. Biometrische Sperre, AES-256-GCM Backup, smarte Erinnerungen. Open Beta auf Google Play.',
    tags:['Kotlin','Compose','AES-256-GCM','Open Beta'],
    playUrl:'https://play.google.com/store/apps/details?id=com.appscanfly.cozycare',
    screens:[
      {l:'Kalender',d:'Monatskalender mit Erinnerungen — 1 Tag oder 1 Stunde vorher, AlarmManager-basiert.'},
      {l:'6 Themes',d:'Sage Green, Rose, Himmelblau, Lavendel, Terrakotta, Mintgrün.'},
      {l:'Backup',d:'PBKDF2 + AES-256-GCM, .cozybackup-Format, re-encrypted via Android Keystore.'},
    ]
  },
  {
    name:'Topfgeflüster', emoji:'🍳', color:'#D4A843',
    light:'#FDF8EC', mid:'#ECD898', sublabel:'Jetpack Compose',
    desc:'Community-Rezeptplattform — nur echte Rezepte echter Menschen. Foto-Upload, öffentlich/privat, Live auf Google Play.',
    tags:['Kotlin','Firestore','Spoonacular','Live'],
    playUrl:'https://play.google.com/store/apps/details?id=com.appscanfly.topfgefluester',
    screens:[
      {l:'Rezept-Feed',d:'Community-Feed mit Foto-Thumbnails, Kategorie-Filter, öffentlich/privat Toggle.'},
      {l:'Editor',d:'Schritt-für-Schritt Editor mit Foto-Upload und Sichtbarkeitssteuerung.'},
      {l:'Dark Culinary',d:'#0E0E0E Base, Amber-Gold #D4A843 Accent. Minimalistisch und appetitlich.'},
    ]
  }
];

// ════════════════════════════════════════
// PANORAMA TEXTURE (draw before THREE init)
// ════════════════════════════════════════
function makePanoTex() {
  const SW = 1024, TH = 1024, N = APPS.length;
  const TW = SW * N;
  const cv = document.createElement('canvas');
  cv.width = TW; cv.height = TH;
  const c = cv.getContext('2d');

  APPS.forEach((app, i) => {
    const x0 = i * SW;

    // bg gradient
    const bg = c.createLinearGradient(x0, 0, x0, TH);
    bg.addColorStop(0, app.light);
    bg.addColorStop(1, '#ffffff');
    c.fillStyle = bg; c.fillRect(x0, 0, SW, TH);

    // top sheen
    const sh = c.createLinearGradient(x0, 0, x0, TH * .35);
    sh.addColorStop(0, 'rgba(255,255,255,.6)');
    sh.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = sh; c.fillRect(x0, 0, SW, TH * .35);

    // placeholder screenshot mockup
    const mx = x0 + SW * .12, my = TH * .08;
    const mw = SW * .76, mh = TH * .42;
    c.fillStyle = app.mid + '55';
    c.beginPath(); c.roundRect(mx, my, mw, mh, 16); c.fill();
    // phone frame lines
    c.strokeStyle = app.color + '44'; c.lineWidth = 2;
    c.beginPath(); c.roundRect(mx, my, mw, mh, 16); c.stroke();
    // screen content placeholder bars
    for (let b = 0; b < 4; b++) {
      c.fillStyle = app.color + '22';
      c.beginPath();
      c.roundRect(mx + mw*.08, my + mh*.15 + b*(mh*.18), mw*(0.5+Math.random()*.35), mh*.10, 6);
      c.fill();
    }
    // emoji in mockup
    c.font = `${TH * .14}px serif`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(app.emoji, x0 + SW / 2, my + mh * .5);

    // app name
    c.font = `700 ${TH * .075}px 'Space Grotesk',sans-serif`;
    c.fillStyle = app.color;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(app.name, x0 + SW / 2, TH * .62);

    // sublabel
    c.font = `400 ${TH * .038}px 'JetBrains Mono',monospace`;
    c.fillStyle = '#aaaaaa';
    c.fillText(app.sublabel.toUpperCase(), x0 + SW / 2, TH * .72);

    // desc snippet
    c.font = `400 ${TH * .028}px 'Space Grotesk',sans-serif`;
    c.fillStyle = '#999999';
    const words = app.desc.split(' ').slice(0,8).join(' ') + '…';
    c.fillText(words, x0 + SW / 2, TH * .80);

    // VIEW pill
    const bw=130, bh=36, bx=x0+SW/2-65, by=TH*.88-18;
    c.beginPath(); c.roundRect(bx,by,bw,bh,18); c.fillStyle='rgba(150,150,150,.22)'; c.fill();
    c.font=`500 ${TH*.032}px 'Space Grotesk',sans-serif`;
    c.fillStyle='rgba(80,80,80,.6)';
    c.fillText('VIEW', x0+SW/2, TH*.88);
  });

  return cv;
}

// ════════════════════════════════════════
// THREE.JS SETUP
// ════════════════════════════════════════
const canvas = document.getElementById('c');

// Size canvas explicitly
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,          // solid — no transparency issues
});
renderer.setClearColor(0xffffff, 1);   // white background
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

// Camera: eye-level side view
const cam = new THREE.PerspectiveCamera(36, window.innerWidth/window.innerHeight, 0.1, 100);
cam.position.set(0, 0.15, 5.5);
cam.lookAt(0, 0, 0);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const sun = new THREE.DirectionalLight(0xfff5e8, 1.2);
sun.position.set(4, 8, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=sun.shadow.camera.bottom=-6;
sun.shadow.camera.right=sun.shadow.camera.top=6;
scene.add(sun);

const fillLight = new THREE.DirectionalLight(0xd0e4ff, 0.35);
fillLight.position.set(-4, 3, -3);
scene.add(fillLight);

// ── Env map (r128 compatible) ──
(function buildEnv(){
  const pm = new THREE.PMREMGenerator(renderer);
  pm.compileEquirectangularShader();
  const ec = document.createElement('canvas');
  ec.width=512; ec.height=256;
  const ex = ec.getContext('2d');
  const g = ex.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#b8cce8'); g.addColorStop(.5,'#e8e3da'); g.addColorStop(1,'#f5f3ef');
  ex.fillStyle=g; ex.fillRect(0,0,512,256);
  const sg=ex.createRadialGradient(370,50,0,370,50,80);
  sg.addColorStop(0,'rgba(255,245,210,.85)');sg.addColorStop(1,'rgba(255,245,210,0)');
  ex.fillStyle=sg; ex.fillRect(0,0,512,256);
  const t=new THREE.CanvasTexture(ec);
  t.mapping=THREE.EquirectangularReflectionMapping;
  scene.environment=pm.fromEquirectangular(t).texture;
  t.dispose(); pm.dispose();
})();

// ════════════════════════════════════════
// CYLINDER — wide & low like Aikawa
// ════════════════════════════════════════
const R=2.2, H=1.5, SEGS=128;

const cylGeo = new THREE.CylinderGeometry(R, R, H, SEGS, 1, true);

// Flip U so drag-right spins correctly
const uvArr = cylGeo.attributes.uv.array;
for (let i=0; i<uvArr.length; i+=2) uvArr[i] = 1 - uvArr[i];
cylGeo.attributes.uv.needsUpdate = true;

// Build texture from canvas
const panoCanvas = makePanoTex();
const panoTex = new THREE.CanvasTexture(panoCanvas);
panoTex.wrapS = THREE.RepeatWrapping;
panoTex.needsUpdate = true;

const cylMat = new THREE.MeshStandardMaterial({
  map: panoTex,
  roughness: 0.08,
  metalness: 0.02,
  envMapIntensity: 1.2,
  side: THREE.FrontSide,
});

const cylGroup = new THREE.Group();
scene.add(cylGroup);

const cylMesh = new THREE.Mesh(cylGeo, cylMat);
cylMesh.castShadow = true;
cylGroup.add(cylMesh);

// Caps
const capMat = new THREE.MeshStandardMaterial({
  color:0xfafaf7, roughness:0.1, metalness:0.06, envMapIntensity:1.1
});
[H/2+0.013, -H/2-0.013].forEach(y => {
  const cap = new THREE.Mesh(
    new THREE.CylinderGeometry(R, R, 0.026, 128), capMat
  );
  cap.position.y = y;
  cap.castShadow = true;
  cylGroup.add(cap);
});

// Gloss highlight arc (fake Fresnel)
const glGeo = new THREE.CylinderGeometry(R+.003,R+.003,H*.68,128,1,true,-0.25,0.52);
cylGroup.add(new THREE.Mesh(glGeo, new THREE.MeshBasicMaterial({
  color:0xffffff,transparent:true,opacity:0.09,side:THREE.BackSide,depthWrite:false
})));

// ════════════════════════════════════════
// GROUND + REFLECTION
// ════════════════════════════════════════
const groundY = -H/2 - 0.013 - 0.001;
const gGeo = new THREE.PlaneGeometry(20,20);

// Solid ground
const gnd = new THREE.Mesh(gGeo, new THREE.MeshStandardMaterial({
  color:0xedece8, roughness:0.05, metalness:0
}));
gnd.rotation.x=-Math.PI/2; gnd.position.y=groundY; gnd.receiveShadow=true;
scene.add(gnd);

// Mirror render target
const mirRT = new THREE.WebGLRenderTarget(512,512);
const mirMesh = new THREE.Mesh(gGeo, new THREE.MeshBasicMaterial({
  map:mirRT.texture, transparent:true, opacity:0.30
}));
mirMesh.rotation.x=-Math.PI/2; mirMesh.position.y=groundY-0.002;
scene.add(mirMesh);
const mirCam = new THREE.PerspectiveCamera(36,1,0.1,100);

// Fade over mirror
(function buildFade(){
  const fc=document.createElement('canvas'); fc.width=4; fc.height=256;
  const fx=fc.getContext('2d');
  const fg=fx.createLinearGradient(0,0,0,256);
  fg.addColorStop(0,'rgba(255,255,255,0)');
  fg.addColorStop(.25,'rgba(255,255,255,.65)');
  fg.addColorStop(.6,'rgba(255,255,255,.93)');
  fg.addColorStop(1,'rgba(255,255,255,1)');
  fx.fillStyle=fg; fx.fillRect(0,0,4,256);
  const fm=new THREE.Mesh(gGeo, new THREE.MeshBasicMaterial({
    map:new THREE.CanvasTexture(fc),transparent:true,depthWrite:false
  }));
  fm.rotation.x=-Math.PI/2; fm.position.y=groundY+0.004;
  scene.add(fm);
})();

// ════════════════════════════════════════
// ROTATION + DRAG
// ════════════════════════════════════════
let rotY=0, targetY=0, autoSpin=true;
let isDrag=false, dragX0=0, dragR0=0, dragDx=0;
const lerp=(a,b,t)=>a+(b-a)*t;

canvas.addEventListener('mousedown',e=>{
  isDrag=true;autoSpin=false;dragX0=e.clientX;dragR0=targetY;dragDx=0;
});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  dragDx=e.clientX-dragX0;
  targetY=dragR0-dragDx*.007;
});
window.addEventListener('mouseup',()=>{isDrag=false});
canvas.addEventListener('touchstart',e=>{
  isDrag=true;autoSpin=false;
  dragX0=e.touches[0].clientX;dragR0=targetY;dragDx=0;
},{passive:true});
window.addEventListener('touchmove',e=>{
  if(!isDrag)return;
  dragDx=e.touches[0].clientX-dragX0;
  targetY=dragR0-dragDx*.007;
},{passive:true});
window.addEventListener('touchend',()=>{isDrag=false});
(function spin(){requestAnimationFrame(spin);if(autoSpin)targetY+=.003;})();

// ════════════════════════════════════════
// CLICK → which app zone
// ════════════════════════════════════════
const ray=new THREE.Raycaster();
const mp=new THREE.Vector2();

canvas.addEventListener('click',e=>{
  if(Math.abs(dragDx)>8)return;
  const r=canvas.getBoundingClientRect();
  mp.x=((e.clientX-r.left)/r.width)*2-1;
  mp.y=-((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(mp,cam);
  const hits=ray.intersectObject(cylMesh);
  if(!hits.length)return;
  const pt=hits[0].point;
  // atan2 gives angle in world space; subtract current rotation
  let a=Math.atan2(pt.x,pt.z)-rotY;
  a=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const idx=Math.floor(a/(Math.PI*2)*APPS.length)%APPS.length;
  triggerOpen(idx,e.clientX,e.clientY);
});

// ════════════════════════════════════════
// SHARDS
// ════════════════════════════════════════
const sc=document.getElementById('sc');
const shCtx=sc.getContext('2d');
let shards=[];
function resShard(){sc.width=window.innerWidth;sc.height=window.innerHeight;}
resShard(); window.addEventListener('resize',resShard);

function spawnShards(app,cx,cy){
  for(let i=0;i<38;i++){
    const a=Math.random()*Math.PI*2, spd=5+Math.random()*16;
    const s=12+Math.random()*105, n=3+Math.floor(Math.random()*2);
    const pts=Array.from({length:n},(_,v)=>{
      const ang=v/n*Math.PI*2+Math.random()*.9;
      return{x:Math.cos(ang)*s*(.4+Math.random()*.6),y:Math.sin(ang)*s*(.3+Math.random()*.7)};
    });
    shards.push({cx,cy,pts,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-5,
      vr:(Math.random()-.5)*.18,rot:Math.random()*Math.PI*2,
      life:1,color:app.color,light:app.light});
  }
}
function shardTick(){
  shCtx.clearRect(0,0,sc.width,sc.height);
  shards=shards.filter(s=>s.life>.005);
  shards.forEach(s=>{
    s.cx+=s.vx;s.cy+=s.vy;s.vy+=.28;s.vx*=.95;
    s.rot+=s.vr;s.life*=.90;
    shCtx.save();
    shCtx.globalAlpha=s.life*.76;
    shCtx.translate(s.cx,s.cy);shCtx.rotate(s.rot);
    shCtx.beginPath();shCtx.moveTo(s.pts[0].x,s.pts[0].y);
    s.pts.slice(1).forEach(p=>shCtx.lineTo(p.x,p.y));
    shCtx.closePath();
    const g=shCtx.createLinearGradient(-40,-40,40,40);
    g.addColorStop(0,s.light+'F0');g.addColorStop(1,s.color+'99');
    shCtx.fillStyle=g;shCtx.fill();
    shCtx.strokeStyle=s.color+'66';shCtx.lineWidth=1;shCtx.stroke();
    shCtx.restore();
  });
  requestAnimationFrame(shardTick);
}
shardTick();

// ════════════════════════════════════════
// DETAIL VIEW
// ════════════════════════════════════════
const detail=document.getElementById('detail');
const dvTitle=document.getElementById('dv-title');
const dvBody=document.getElementById('dv-body');
const dvClose=document.getElementById('dv-close');
const bgText=document.getElementById('bg-text');
const hint=document.getElementById('hint');
let detailOpen=false;
const VBG=[['#EEE6FF','#D8CCFF'],['#FFF0EB','#FFD4BC'],['#EBFFF2','#C4F0D4']];

function buildCards(app){
  dvBody.innerHTML='';
  const intro=document.createElement('p');
  intro.className='dv-intro';intro.textContent=app.desc;
  dvBody.appendChild(intro);
  const col=document.createElement('div');col.className='dv-col';
  app.screens.forEach((sc,i)=>{
    const card=document.createElement('div');
    card.className='dv-card';card.style.transitionDelay=`${i*.11}s`;
    const[c0,c1]=VBG[i%VBG.length];
    card.innerHTML=`
      <div class="dv-visual" style="background:linear-gradient(135deg,${c0},${c1})">
        <span>${app.emoji}</span>
        <div class="dv-sc-label" style="color:${app.color}">${sc.l}</div>
      </div>
      <div class="dv-body2">
        <div class="dv-eyebrow">${sc.l}</div>
        <div class="dv-cname" style="color:${app.color}">${app.name}</div>
        <div class="dv-cdesc">${sc.d}</div>
        <div class="dv-tags">${app.tags.map(t=>`<span class="dv-tag">${t}</span>`).join('')}</div>
        ${i===app.screens.length-1?`<a class="dv-btn" href="${app.playUrl}" target="_blank" style="background:${app.color};color:#fff">Auf Google Play →</a>`:''}
      </div>`;
    col.appendChild(card);
  });
  dvBody.appendChild(col);
}

function triggerOpen(idx,cx,cy){
  if(detailOpen)return;
  detailOpen=true;
  const app=APPS[idx];
  spawnShards(app,cx,cy);
  buildCards(app);
  dvTitle.textContent=app.name;dvTitle.style.color=app.color;
  bgText.classList.add('hide');hint.style.opacity='0';
  setTimeout(()=>{
    detail.classList.add('open');
    setTimeout(()=>dvTitle.classList.add('show'),60);
    setTimeout(()=>{
      dvBody.querySelectorAll('.dv-card').forEach((c,i)=>{
        setTimeout(()=>c.classList.add('in'),i*120);
      });
    },340);
  },30);
}
function closeDetail(){
  if(!detailOpen)return;detailOpen=false;
  dvTitle.classList.remove('show');
  bgText.classList.remove('hide');hint.style.opacity='1';
  setTimeout(()=>{detail.classList.remove('open');detail.scrollTop=0;dvBody.innerHTML='';},480);
}
dvClose.addEventListener('click',closeDetail);
detail.addEventListener('scroll',()=>{
  const dH=detail.clientHeight;
  detail.querySelectorAll('.dv-card.in').forEach(card=>{
    const top=card.getBoundingClientRect().top;
    const p=Math.max(0,(dH*.48-top)/dH);
    card.style.transform=`translateY(${-p*p*24}px) scale(${1-p*.032})`;
    card.style.opacity=String(Math.max(0,1-p*1.5));
  });
});

// ════════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════════
function render(){
  requestAnimationFrame(render);
  if (panoTex) panoTex.needsUpdate = true;
  rotY=lerp(rotY,targetY,.07);
  cylGroup.rotation.y=rotY;

  // mirror pass
  mirMesh.visible=false;
  mirCam.copy(cam);
  mirCam.position.y=2*groundY-cam.position.y;
  mirCam.lookAt(0,groundY,0);
  mirCam.aspect=1;mirCam.updateProjectionMatrix();
  renderer.setRenderTarget(mirRT);
  renderer.render(scene,mirCam);
  renderer.setRenderTarget(null);
  mirMesh.visible=true;

  renderer.render(scene,cam);
}
render();
</script>
