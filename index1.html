<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CozyCare Portfolio</title>
    <style>
        body { margin: 0; background: #000; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 10; pointer-events: none; }
        .work-item { width: 40vw; height: 50vh; margin: 40vh auto; position: relative; opacity: 0; }
    </style>
</head>
<body>

    <div class="work-item" data-src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe"></div>
    <div class="work-item" data-src="https://images.unsplash.com/photo-1556910103-1c02745aae4d"></div>

    <canvas id="app"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#app'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const loader = new THREE.TextureLoader();
        const items = document.querySelectorAll('.work-item');
        const meshStore = [];

        items.forEach(el => {
            // Bilder sicher laden
            loader.load(el.dataset.src, (tex) => {
                const geo = new THREE.PlaneGeometry(1, 1, 32, 32);
                const mat = new THREE.MeshBasicMaterial({ map: tex });
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);
                meshStore.push({ el, mesh });
            });
        });

        function render() {
            meshStore.forEach(m => {
                const rect = m.el.getBoundingClientRect();
                // Korrekte Sync-Skalierung für GitHub Pages
                const scaleX = rect.width * 0.01;
                const scaleY = rect.height * 0.01;
                m.mesh.scale.set(scaleX, scaleY, 1);
                
                m.mesh.position.set(
                    (rect.left + rect.width/2 - window.innerWidth/2) * 0.01,
                    -(rect.top + rect.height/2 - window.innerHeight/2) * 0.01,
                    0
                );
            });
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }
        render();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
