<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            color: white;
        }
        h1 {
            font-size: 5vw;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-align: center;
            opacity: 0.1;
            user-select: none;
        }
        .instructions {
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: white;
            color: black;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            display: none;
            z-index: 20;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <button class="back-btn" id="backBtn">Zurück</button>

    <div class="ui-layer">
        <h1>Portfolio</h1>
        <div class="instructions">Scrollen / Ziehen zum Drehen • Klicken zum Öffnen</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURATION ---
        // Ersetze diese URLs später mit deinen echten App-Screenshots (z.B. aus deinem GitHub-Repo)
        const TEXTURES = [
            'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80', // App 1
            'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&w=800&q=80', // App 2
            'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&w=800&q=80', // App 3
            'https://images.unsplash.com/photo-1618005198143-e5283b519a7f?auto=format&fit=crop&w=800&q=80'  // App 4
        ];

        // --- SETUP SCENE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 7;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- CUSTOM SHADER FOR EXPLOSION/SHATTER EFFECT ---
        const vertexShader = `
            uniform float uProgress;
            uniform float uType; // 0 = Cylinder, 1 = Flat
            varying vec2 vUv;
            varying float vExplode;
            
            // Simpler Noise-Generator für das Zersplittern
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
            }

            void main() {
                vUv = uv;
                
                vec3 pos = position;
                float noise = hash(uv);
                vExplode = noise;

                // Wenn uProgress steigt, fliegen die Vertices (Splitter) basierend auf dem Noise-Wert auseinander
                if(uProgress > 0.0) {
                    pos.x += sin(noise * 100.0) * uProgress * 2.0;
                    pos.y += cos(noise * 100.0) * uProgress * 2.0;
                    pos.z += (noise - 0.5) * uProgress * 5.0;
                }

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTexture;
            uniform float uProgress;
            varying vec2 vUv;
            varying float vExplode;

            void main() {
                vec4 color = texture2D(uTexture, vUv);
                
                // Ausblenden während des Zersplitterns
                float alpha = 1.0 - smoothstep(0.1, 1.0, uProgress);
                
                gl_FragColor = vec4(color.rgb, color.a * alpha);
                if (gl_FragColor.a < 0.01) discard;
            }
        `;

        // --- CREATE CYLINDER CAROUSEL ---
        const meshes = [];
        const radius = 4;
        const count = TEXTURES.length;
        const meshGroup = new THREE.Group();
        scene.add(meshGroup);

        // Geometrie mit hoher Unterteilung für feine Splitterfragmente
        const geometry = new THREE.PlaneGeometry(3, 4, 60, 60); 

        const textureLoader = new THREE.TextureLoader();

        TEXTURES.forEach((url, i) => {
            const texture = textureLoader.load(url);
            
            const material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    uTexture: { value: texture },
                    uProgress: { value: 0.0 }
                },
                side: THREE.DoubleSide,
                transparent: true
            });

            const mesh = new THREE.Mesh(geometry, material);
            
            // Berechne die zylindrische Anordnung
            const angle = (i / count) * Math.PI * 2;
            mesh.position.x = Math.cos(angle) * radius;
            mesh.position.z = Math.sin(angle) * radius;
            
            // Rotiere die Schilder zur Mitte des Zylinders
            mesh.lookAt(0, 0, 0);
            
            // Speichere initiale Werte für die Animation
            mesh.userData = {
                index: i,
                angle: angle,
                initX: mesh.position.x,
                initZ: mesh.position.z,
                initRotY: mesh.rotation.y
            };

            meshes.push(mesh);
            meshGroup.add(mesh);
        });

        // --- INTERACTION LOGIC (SCROLL & DRAG) ---
        let targetRotation = 0;
        let currentRotation = 0;
        let isDragging = false;
        let previousMousePosition = { x: 0 };
        let activeMesh = null;

        // Mausrad / Touchpad
        window.addEventListener('wheel', (e) => {
            if (activeMesh) return;
            targetRotation -= e.deltaY * 0.0015;
        });

        // Drag-Interaktion (Touch & Maus)
        window.addEventListener('pointerdown', (e) => {
            if (activeMesh) return;
            isDragging = true;
            previousMousePosition.x = e.clientX;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || activeMesh) return;
            const deltaX = e.clientX - previousMousePosition.x;
            targetRotation += deltaX * 0.005;
            previousMousePosition.x = e.clientX;
        });

        window.addEventListener('pointerup', () => { isDragging = false; });

        // --- CLICK TO ZOOM & SHATTER ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            if (activeMesh || isDragging) return;

            // Normalisiere Mauskoordinaten
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                selectProject(intersects[0].object);
            }
        });

        function selectProject(mesh) {
            activeMesh = mesh;
            document.getElementById('backBtn').style.display = 'block';

            // 1. Zerstöre/Zersplittere alle ANDEREN Apps im Karussell
            meshes.forEach((m) => {
                if (m !== mesh) {
                    gsap.to(m.material.uniforms.uProgress, {
                        value: 1.0,
                        duration: 1.2,
                        ease: "power2.out"
                    });
                }
            });

            // 2. Berechne die Position direkt vor der Kamera für das ausgewählte Objekt
            // Wir rotieren die Hauptgruppe so, dass das gewählte Objekt flach zur Kamera schaut
            const targetGroupRot = -mesh.userData.angle - Math.PI/2;
            
            const timeline = gsap.timeline();
            
            timeline.to(meshGroup.rotation, {
                y: targetGroupRot,
                duration: 1.0,
                ease: "power3.inOut"
            }, 0);

            timeline.to(mesh.position, {
                x: 0,
                z: radius + 2, // Bringt es näher an die Kamera
                duration: 1.2,
                ease: "power3.inOut"
            }, 0);

            timeline.to(mesh.rotation, {
                x: 0, y: 0, z: 0, // Richtet es perfekt flach aus
                duration: 1.2,
                ease: "power3.inOut"
            }, 0);
        }

        // --- BACK BUTTON LOGIC ---
        document.getElementById('backBtn').addEventListener('click', () => {
            if (!activeMesh) return;

            const timeline = gsap.timeline({
                onComplete: () => {
                    activeMesh = null;
                    document.getElementById('backBtn').style.display = 'none';
                }
            });

            // Bring das aktive Mesh zurück in den Zylinderverband
            timeline.to(activeMesh.position, {
                x: activeMesh.userData.initX,
                z: activeMesh.userData.initZ,
                duration: 1.2,
                ease: "power3.out"
            }, 0);

            timeline.to(activeMesh.rotation, {
                y: activeMesh.userData.initRotY,
                duration: 1.2,
                ease: "power3.out"
            }, 0);

            // Setze den Zersplitterungs-Effekt der anderen Meshes zurück
            meshes.forEach((m) => {
                timeline.to(m.material.uniforms.uProgress, {
                    value: 0.0,
                    duration: 1.0,
                    ease: "power2.inOut"
                }, 0);
            });
        });

        // --- RESIZE CANVAS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Trägheit (Lerp) beim Scrollen/Drehen für das "schwere", flüssige Gefühl
            if (!activeMesh) {
                currentRotation += (targetRotation - currentRotation) * 0.05;
                meshGroup.rotation.y = currentRotation;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
